# 도메인 명세서 — 신도림역 버티포트 증축 설계
# drift_detector가 AST와 역대조하는 단일 진실 공급원(SSOT).

version: '1.0'
domain: sindorim_vertiport
contracts:
- kind: function
  module: my-harness-platform/src/domain
  name: build_initial_ontology_state
  parameters:
  - name: bim_extract
    type: dict
  - name: prevailing_wind_deg
    type: float
  returns: dict
  docstring_required: true
- kind: function
  module: my-harness-platform/src/domain
  name: generate_spatial_layout
  parameters:
  - name: state
    type: dict
  - name: user_instruction
    type: str
  - name: locks
    type: list
  returns: dict
  docstring_required: true
- kind: function
  module: my-harness-platform/src/domain
  name: score_compliance_ols
  parameters:
  - name: layout
    type: dict
  - name: regulations
    type: dict
  returns: dict
  docstring_required: true
- kind: function
  module: my-harness-platform/src/domain
  name: score_aero_structure
  parameters:
  - name: layout
    type: dict
  - name: wind_rose
    type: dict
  returns: dict
  docstring_required: true
- kind: function
  module: my-harness-platform/src/domain
  name: score_operation_flow
  parameters:
  - name: layout
    type: dict
  returns: dict
  docstring_required: true
- kind: function
  module: my-harness-platform/src/domain
  name: merge_audit_reports
  parameters:
  - name: reports
    type: list
  returns: dict
  docstring_required: true
forbidden_imports:
- revit_api
- dynamo
- clr
- openai
- anthropic
invariants:
- id: INV-VP-001
  description: Layout JSON은 version, elements[], locks_applied 키를 가진다
  required_keys:
  - version
  - elements
  - locks_applied
- id: INV-VP-002
  description: 평가자 에이전트 출력에 coordinates 필드가 있으면 SPEC_DRIFT
  pattern: ^((?!coordinates).)*$
- id: INV-VP-003
  description: Compliance 위반 시 verdict는 FAIL이며 layout_agent로 라우팅
  required_keys:
  - verdict
