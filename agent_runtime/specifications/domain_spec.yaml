# 도메인 핵심 물리 수식/규칙 명세서
# drift_detector가 AST와 역대조하는 단일 진실 공급원(SSOT).

version: "1.0"
domain: harness_automation

# 도메인이 노출해야 하는 함수/클래스의 시그니처 계약.
contracts:
  - kind: function
    module: my-harness-platform/src/domain
    name: validate_spec_integrity
    parameters:
      - name: spec
        type: dict
    returns: bool
    docstring_required: true

  - kind: function
    module: my-harness-platform/src/domain
    name: compute_failure_signature
    parameters:
      - name: failure_type
        type: str
      - name: trace_path
        type: str
    returns: str
    docstring_required: true

# 도메인 레이어에서 절대로 import해서는 안 되는 패키지 (외부 의존성 0% 보장).
forbidden_imports:
  - fastapi
  - sqlalchemy
  - docker
  - openai
  - anthropic
  - langgraph
  - requests
  - httpx

# 물리/비즈니스 규칙 인바리언트.
invariants:
  - id: INV-001
    description: "failure signature는 64자 hex (SHA-256 prefix) 형식이어야 한다."
    pattern: "^[a-f0-9]{16,64}$"
  - id: INV-002
    description: "spec dict은 반드시 'version' 키를 보유한다."
    required_keys: ["version"]
