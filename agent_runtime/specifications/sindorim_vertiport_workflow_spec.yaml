# 워크플로 명세서 — 신도림역 버티포트 증축 설계
# LangGraph 노드·엣지 계약.

version: '1.0'
workflow: sindorim_vertiport_v1
stages:
- id: setup
  nodes:
  - bim_sync
  - ontology_bootstrap
- id: input_generation
  nodes:
  - parse_instruction
  - apply_locks
  - spatial_layout
- id: multi_agent_audit
  nodes:
  - compliance_ols
  - aero_structure
  - operation_flow
  on_fail: spatial_layout
- id: decision_integration
  nodes:
  - preview_ghost_model
  - proposal_cards
  - selective_apply
  on_fail: input_generation
- id: finalization
  nodes:
  - revit_transaction_commit
  - engineering_report
routing_rules:
- when: all_auditors_pass
  then: decision_integration
- when: any_auditor_fail
  then: spatial_layout
  payload: merged_feedback
