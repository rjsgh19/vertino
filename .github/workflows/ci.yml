name: harness-factory-ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type:
    name: Lint & Static Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check harness_engine agent_runtime infrastructure my-harness-platform/src

      - name: Mypy
        run: mypy harness_engine agent_runtime infrastructure
        continue-on-error: true

  test-harness:
    name: TDD Test Harness (Sandbox-isolated)
    runs-on: ubuntu-latest
    needs: lint-and-type
    services:
      docker:
        image: docker:24-dind
        options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pull sandbox image
        run: docker pull python:3.11-slim

      - name: Run TDD Harness
        run: pytest my-harness-platform/tests -v --maxfail=3 --tb=short

      - name: Manifest integrity check
        run: |
          python - <<'PY'
          import json, hashlib, pathlib, sys
          mp = pathlib.Path('my-harness-platform/.generated_manifest.json')
          if not mp.exists():
              print('manifest 없음 — 검증 스킵'); sys.exit(0)
          data = json.loads(mp.read_text(encoding='utf-8'))
          fails = []
          for rel, entry in data.get('entries', {}).items():
              p = pathlib.Path(rel)
              if not p.exists():
                  fails.append((rel, 'missing')); continue
              if hashlib.sha256(p.read_bytes()).hexdigest() != entry['sha256']:
                  fails.append((rel, 'hash mismatch'))
          if fails:
              print('Manifest 위반:', fails); sys.exit(1)
          print('Manifest 무결성 OK')
          PY

  security-scan:
    name: Security Static Scan
    runs-on: ubuntu-latest
    needs: lint-and-type
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scanner
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Bandit (생성 코드 영역 우선)
        run: bandit -r my-harness-platform/src harness_engine -ll
        continue-on-error: true
